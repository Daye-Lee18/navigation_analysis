services:
  realtime_road_traffic:
    env_key: REALTIME_ROAD_TRAFFIC_API_KEY
    path: /traffic/realtimeRoadTraffic
    method: GET
    response_format: xml
    description: 실시간 도로 소통 정보

  seoul_traffic_point:
    env_key: SEOUL_TRAFFIC_POINT_API_KEY
    path: /traffic/seoulTrafficPoint
    method: GET
    response_format: xml
    description: 서울시 교통량 지점 정보

  seoul_traffic_history:
    env_key: SEOUL_TRAFFIC_HISTORY_API_KEY
    path: /traffic/seoulTrafficHistory
    method: GET
    response_format: xml
    description: 서울시 교통량 이력 정보

  incident_type_code:
    env_key: INCIDENT_TYPE_CODE_API_KEY
    path: /incident/typeCode
    method: GET
    response_format: xml
    description: 돌발 유형 코드 정보

  incident_detail_type:
    env_key: INCIDENT_DETAIL_TYPE_API_KEY
    path: /incident/detailTypeCode
    method: GET
    response_format: xml
    description: 돌발 세부유형 코드 정보

  realtime_incident:
    env_key: REALTIME_INCIDENT_API_KEY
    path: /incident/realtime
    method: GET
    response_format: xml
    description: 실시간 돌발 정보

  traffic_region:
    env_key: TRAFFIC_REGION_API_KEY
    path: /base/trafficRegion
    method: GET
    response_format: xml
    description: 교통권역정보

  road_class:
    env_key: ROAD_CLASS_API_KEY
    path: /base/roadClass
    method: GET
    response_format: xml
    description: 도로분류정보

  road_info:
    env_key: ROAD_INFO_API_KEY
    path: /base/roadInfo
    method: GET
    response_format: xml
    description: 도로정보

  incident_road_link:
    env_key: INCIDENT_ROAD_LINK_API_KEY
    path: /base/incidentRoadLink
    method: GET
    response_format: xml
    description: 돌발 도로별 링크 정보

  incident_link:
    env_key: INCIDENT_LINK_API_KEY
    path: /base/incidentLink
    method: GET
    response_format: xml
    description: 돌발 링크 정보

  incident_link_vertex:
    env_key: INCIDENT_LINK_VERTEX_API_KEY
    path: /base/incidentLinkVertex
    method: GET
    response_format: xml
    description: 돌발 링크 Vertex 정보